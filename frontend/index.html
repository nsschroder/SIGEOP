<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>SIGEOP</title>
    <link rel="icon" href="styles/img/logoPMESP.png" type="image/png" sizes="32x32">
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="background"></div>

    <div class="login-container">
        <div class="logo">
            <div class="brasoes-container">
                <img src="styles/img/logoSSP.png" alt="Logo SSP" class="brasao">
                <div class="divisor-vertical"></div>
                <img src="styles/img/logoPMESP.png" alt="Logo PMESP" class="brasao">
            </div>
            <h1>SIGEOP</h1>
            <p>Sistema de Gestão Operacional</p>
        </div>

        <form class="login-box">
            <h2>Acesso ao Sistema</h2>

            <div class="input-group">
                <input type="text" placeholder="Usuário" required>
            </div>

            <div class="input-group">
                <input type="password" placeholder="Senha" required>
                <div class="login-helper">
                    <label><input type="checkbox"> Lembrar-me</label>
                    <a href="#" class="forgot-password">Esqueci minha senha</a>
                </div>
            </div>

            <button type="button" onclick="entrar()">Entrar</button>

            <div class="suporte-link">
                Precisa de ajuda? <a href="#">Contate o administrador</a>
            </div>
        </form>

        <div class="footer">
            <p>Polícia Militar do Estado de São Paulo</p>
        </div>
    </div>

    <script>
        function entrar() {
            const usuarioInput = document.querySelector('input[type="text"]').value;
            const senhaInput = document.querySelector('input[type="password"]').value;
            const botao = document.querySelector('.login-box button');

            // Simulação de credenciais (ADMIN / ADMIN)
            const usuarioCorreto = "ADMIN";
            const senhaCorreta = "ADMIN";

            // Efeito visual de processamento
            botao.disabled = true;
            botao.innerHTML = "Verificando...";
            botao.style.opacity = "0.7";
            botao.style.cursor = "not-allowed";

            setTimeout(() => {
                // Validação simples
                if (usuarioInput.toUpperCase() === usuarioCorreto && senhaInput === senhaCorreta) {

                    // Salva o nome do usuário para usar na Dashboard depois
                    localStorage.setItem("usuarioLogado", "Administrador do Sistema");

                    // Redireciona
                    window.location.href = "pages/dashboard.html";
                } else {
                    // Se errar, volta o botão ao normal e avisa
                    alert("❌ Usuário ou senha inválidos!");
                    botao.disabled = false;
                    botao.innerHTML = "Entrar";
                    botao.style.opacity = "1";
                    botao.style.cursor = "pointer";

                    // Limpa o campo de senha para nova tentativa
                    document.querySelector('input[type="password"]').value = "";
                }
            }, 800); // Aguarda 800ms para simular uma resposta do servidor
        }
        // Permite logar apertando a tecla Enter
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                entrar();
            }
        });
    </script>

</body>

</html>
